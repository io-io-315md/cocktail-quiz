<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カクテルレシピクイズ</title>
  <link rel="stylesheet" href="style.css">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="home.png">
  <link rel="apple-touch-icon" href="home.png">
  <meta name="theme-color" content="#007bff">
</head>
<body>
  <div id="start-container" class="container show">
    <h1>カクテルレシピ<br>クイズ</h1>
    <p>現場のレシピを完璧に覚えよう</p>
    
    <div class="course-menu">
      <button class="menu-btn" onclick="showDifficultySelect('spirits')">スピリッツベース</button>
      <button class="menu-btn" onclick="showDifficultySelect('liqueur')">リキュールベース</button>
      <button class="menu-btn recipe-list-btn" onclick="showRecipeList()">レシピ一覧</button>
    </div>
  </div>

  <div id="difficulty-select-container" class="container" style="display: none;">
    <div class="mode-header">
      <p class="screen-label">Select Difficulty</p>
      <h2>難易度選択</h2>
      <p id="difficulty-course-label" class="mode-description">スピリッツベース</p>
    </div>

    <div class="mode-menu">
      <button class="mode-card" onclick="showModeSelect(selectedCourse, 'beginner')">
        <span class="mode-card__title">初級</span>
        <span class="mode-card__text">基本的なレシピ</span>
      </button>

      <button class="mode-card mode-card--disabled" disabled>
        <span class="mode-card__title">中級</span>
        <span class="mode-card__text">まれに出るレシピ</span>
      </button>

      <button class="mode-card mode-card--disabled" disabled>
        <span class="mode-card__title">上級</span>
        <span class="mode-card__text">メニューにないレシピ</span>
      </button>

      <button class="mode-card" onclick="showModeSelect(selectedCourse, 'random')">
        <span class="mode-card__title">ランダム</span>
        <span class="mode-card__text">全レシピから出題</span>
      </button>
    </div>

    <button class="menu-btn back-title-btn" onclick="returnToTitle()">タイトルへ戻る</button>
  </div>

  <div id="mode-select-container" class="container" style="display: none;">
    <div class="mode-header">
      <p class="screen-label">Select Mode</p>
      <h2>形式選択</h2>
      <p id="selected-course-label" class="mode-description">スピリッツベース / 初級</p>
    </div>

    <div class="mode-menu">
      <button class="mode-card" onclick="startQuiz(selectedCourse, selectedDifficulty, 'normal')">
        <span class="mode-card__title">ノーマルモード</span>
        <span class="mode-card__text">ひとつひとつ確認しながら10問解くモード</span>
      </button>

      <button class="mode-card" onclick="startQuiz(selectedCourse, selectedDifficulty, 'timeAttack')">
        <span class="mode-card__title">タイムアタックモード</span>
        <span class="mode-card__text">10問を一気に解いて、最後に正答率と回答一覧を確認するモード</span>
      </button>
    </div>

    <button class="menu-btn back-title-btn" onclick="showDifficultySelect(selectedCourse)">難易度選択へ戻る</button>
  </div>

  <div id="recipe-list-container" class="container" style="display: none;">
    <div class="recipe-list-header">
      <div>
        <p class="screen-label">Recipe List</p>
        <h2>レシピ一覧</h2>
      </div>
      <button class="back-btn" onclick="returnToTitle()">タイトルへ</button>
    </div>

    <input
      type="search"
      id="recipe-search-input"
      class="recipe-search-input"
      placeholder="カクテル名・材料・技法で検索"
      oninput="renderRecipeList()"
    >

    <div id="recipe-count" class="recipe-count"></div>
    <div id="recipe-list-view" class="recipe-list-view"></div>
  </div>

  <div id="quiz-container" class="container" style="display: none;">
    <button id="pause-btn" class="pause-btn" onclick="pauseQuiz()">一時停止</button>

    <div id="timer-indicator" class="timer-indicator">
      <div class="timer-indicator__label">
        <span id="timer-label-prefix">残り</span>
        <strong id="timer-display">20</strong>
        <span id="timer-label-suffix">秒</span>
      </div>
      <div class="timer-indicator__track">
        <div id="timer-bar" class="timer-indicator__bar"></div>
      </div>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: baseline; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">
      <div>
        <div id="progress-display" style="font-size: 14px; color: #666; font-weight: bold; margin-bottom: 5px;">第 1 問 / 全 10 問</div>
        <h2 id="question-title" style="margin: 0; font-size: 20px;">問題：</h2>
      </div>
    </div>
    
    <div class="section">
      <h3>ベース</h3>
      <div id="baseName-buttons"></div>
      <div id="baseAmount-container" class="amount-container">
        <div id="baseAmount-buttons"></div>
      </div>
    </div>

    <div class="section" id="liqueur-section" style="display: none;">
      <h3>材料</h3>
      <div id="liqueurName-buttons"></div>
      <div id="liqueurAmount-container" class="amount-container">
        <div id="liqueurAmount-buttons"></div>
      </div>
    </div>

    <div class="section">
      <h3>割材</h3>
      <div id="mixerName-buttons"></div>
      <div id="mixerAmount-container" class="amount-container">
        <div id="mixerAmount-buttons"></div>
      </div>
    </div>

    <div class="section">
      <h3>副材料</h3>
      <div id="subName-buttons"></div>
      <div id="subAmount-container" class="amount-container">
        <div id="subAmount-buttons"></div>
      </div>
    </div>

    <div class="section">
      <h3>グラス</h3>
      <div id="glass-buttons"></div>
    </div>

    <div class="section">
      <h3>技法</h3>
      <div id="technique-buttons"></div>
    </div>

    <div id="result-area"></div>
    <button id="judge-btn" onclick="checkAnswer()">判定する</button>
  </div>

  <div id="pause-modal" class="pause-modal" style="display: none;">
    <div class="pause-modal__content">
      <h2>一時停止中</h2>
      <p>再開するか、タイトルへ戻るか選んでください。</p>
      <button class="menu-btn" onclick="resumeQuiz()">再開する</button>
      <button class="menu-btn back-title-btn" onclick="returnToTitle()">タイトルへ戻る</button>
    </div>
  </div>

  <div id="final-result-container" class="container" style="display: none; text-align: center;">
    <h2 id="final-title" style="font-size: 28px; margin-top: 0;">テスト終了！</h2>
    <div id="final-score" style="font-size: 22px; font-weight: bold; margin-bottom: 10px;"></div>
    <div id="final-time" style="font-size: 16px; color: #555; margin-bottom: 25px;"></div>
    
    <h3 id="final-list-title" style="text-align: left; font-size: 16px; border-bottom: 2px solid #ddd; padding-bottom: 5px;">出題レシピのおさらい</h3>
    <div id="recipe-list" style="text-align: left; max-height: 350px; overflow-y: auto; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; font-size: 14px; line-height: 1.6;">
    </div>

    <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
      <button class="menu-btn" onclick="showDifficultySelect(selectedCourse)">同じコースをもう一度</button>
      <button class="menu-btn" style="background-color: #6c757d;" onclick="returnToTitle()">タイトルへ戻る</button>
    </div>
  </div>
  
  <script src="app.js?v=1.8"></script>
</body>
</html>
